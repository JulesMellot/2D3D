name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      # test_pipeline.py uses a stub depth model, so torch/transformers
      # (several GB) are not needed here
      - name: Install minimal dependencies
        run: pip install numpy opencv-python-headless
      - name: Syntax check
        run: python -m py_compile main.py pipeline.py depth.py gui_app.py test_pipeline.py
      - name: Run pipeline self-check
        run: python test_pipeline.py
